name: DeepSeek Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deepseek-cr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: DeepSeek CR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: DeepSeek Code Review
        id: deepseek-review
        continue-on-error: true
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.DEEPSEEK_API_KEY }}
          model: deepseek-v4-pro
          exclude-patterns: package-lock.json,*.lock,public/assets/client.js,public/assets/client.js.map
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sys-prompt: |
            You are a senior engineer reviewing a PR for the Claude Status Dashboard — a local-only web dashboard for tracking Claude Code sessions with ccusage cost integration.

            ## Project conventions
            - **Backend**: Hono (Node.js) server in `src/server.ts`. Pure domain logic in `src/domain.ts`. ccusage integration in `src/usage.ts`.
            - **Frontend**: Vanilla TypeScript in `src/client.ts`, bundled with esbuild to `public/assets/client.js`. No frameworks.
            - **Styling**: Vanilla CSS in `public/assets/styles.css`. Dark theme with CSS custom properties.
            - **Validation**: Zod schemas in `src/domain.ts`.
            - **Testing**: Vitest in `tests/`.
            - **Hooks**: Bash scripts in `hooks/` and `claude-code-plugin/` that pipe Claude Code hook JSON to the API.
            - **Plugin**: Claude Code plugin package in `claude-code-plugin/claude-status-dashboard/`.

            ## What to check
            - **Functional style**: Prefer pure functions and module-level constants over classes.
            - **Error handling**: API endpoints must have proper error responses. Client-side code needs fallback messages.
            - **TypeScript**: Strict mode. Use `readonly` for immutable types. No `any`.
            - **Nullish coalescing**: Use `??` for null/undefined defaults; use `||` for env var defaults where empty string should fall through.
            - **DOM**: Use `createElement` helper, not `innerHTML`. Event listeners attached after render.
            - **CSS**: Use CSS custom properties from `:root`. Responsive with mobile breakpoints.
            - **Security**: Input validation via Zod. No hardcoded secrets.
            - **ccusage**: Parsing handles both `tokenCounts` nested and flat fields, `costUSD`/`totalCost` fallbacks, and agent subcommand fallback.

            ## Output format
            List findings grouped by severity:
            - ❌ **Critical** — bugs, security vulnerabilities, data loss risks
            - ⚠️ **Warning** — convention violations, missing error handling, tech debt
            - 💡 **Suggestion** — improvements, optimizations, best practices

            If no issues found, respond with: "✅ No issues found. Code follows project conventions."

      - name: Notify on Review Failure
        if: steps.deepseek-review.outcome == 'failure' || steps.deepseek-review.outcome == 'error'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const alreadyNotified = comments.some(c =>
              c.body.includes('⚠️ DeepSeek Code Review encountered an error')
            );
            if (alreadyNotified) {
              console.log('Already notified about review failure, skipping.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ DeepSeek Code Review encountered an error and could not complete. The workflow will continue — please review the PR manually or re-run the workflow if this was transient.',
            });
