services:
  dashboard:
    build: .
    container_name: claude-status-dashboard
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
      RED_ALERT_AFTER_MS: "300000"
      USAGE_CACHE_TTL_MS: "30000"
      CLAUDE_CONFIG_DIR: "/claude"
    volumes:
      - "${HOME}/.claude:/claude:ro"
    restart: unless-stopped
